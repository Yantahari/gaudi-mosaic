[build]
  publish = "."

# Service Worker: no cachejar mai (el navegador ha de verificar actualitzacions)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

# Manifest: curt TTL per permetre actualitzacions ràpides
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json; charset=utf-8"

# Icones PWA: cache llarg (no canvien sovint)
[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Textures: cache llarg
[[headers]]
  for = "/assets/textures/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
